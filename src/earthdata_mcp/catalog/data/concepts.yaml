# KMS concept normalization (Phase 2). Maps colloquial terms to GCMD science
# keywords, mirroring NASA get_keywords. Keys are matched case-insensitively.
concepts:
  rain:
    - PRECIPITATION AMOUNT
    - PRECIPITATION RATE
  vegetation:
    - VEGETATION INDEX
    - VEGETATION COVER
  temperature:
    - SURFACE TEMPERATURE
    - AIR TEMPERATURE
